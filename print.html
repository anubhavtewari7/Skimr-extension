<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Skimr - Export Note</title>
  <style>
    body {
      background: #ffffff;
      color: #333333;
      margin: 0;
      padding: 40px;
      background-image: repeating-linear-gradient(transparent, transparent 31px, #e5f0fa 31px, #e5f0fa 32px);
      background-attachment: local;
      line-height: 32px;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    #content {
      max-width: 800px;
      margin: 0 auto;
      background: #ffffff;
    }

    .vault-detail-title {
      font-size: 24pt;
      font-weight: normal;
      color: #2b579a;
      border-bottom: 2px solid #2b579a;
      padding-bottom: 4px;
      margin-bottom: 10px;
    }

    .vault-detail-author {
      color: #666;
      font-size: 11pt;
      margin-bottom: 30px;
    }

    .card {
      margin-bottom: 25px;
    }

    .card-label {
      font-size: 14pt;
      color: #2b579a;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
      margin-bottom: 15px;
    }

    .summary-list {
      list-style: none;
      padding: 0;
    }

    .summary-list li {
      color: #333;
      font-size: 11pt;
      padding-left: 20px;
      margin-bottom: 8px;
      line-height: 1.6;
      position: relative;
    }

    .summary-list li::before {
      content: "•";
      color: #2b579a;
      position: absolute;
      left: 0;
    }

    .flash-card {
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 15px;
      margin-bottom: 15px;
      page-break-inside: avoid;
    }

    .flash-q {
      color: #000;
      font-size: 12pt;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .flash-a {
      color: #444;
      font-size: 11pt;
    }

    .notes-area {
      color: #333;
      font-size: 11pt;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    @media print {
      body { padding: 0; margin: 0; }
      * { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div id="content">Loading export...</div>
  <script src="print.js"></script>
</body>
</html>
